name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev/requirements.txt

      - name: Check SRP (200 line limit)
        run: |
          for f in dev/kid/core/*.py dev/kid/main.py dev/kid/soul/*.py dev/kid/tools/*.py dev/kid/transport/*.py; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 200 ]; then
              echo "❌ $f: ${lines} lines > 200"
              exit 1
            fi
          done
          echo "✅ All files under 200 lines"

      - name: Run tests
        run: |
          cd dev && python -m pytest kid/tests/ -v --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
