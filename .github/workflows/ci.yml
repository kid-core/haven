name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev/requirements.txt

      # ── Linter (ruff) ───────────────────────────────────────────────
      - name: Ruff — fast lint
        run: ruff check dev/kid/ --output-format=github

      # ── Line-length sanity (400 max, up from 200) ────────────────────
      - name: Check file size (≤ 400 lines)
        run: |
          find dev/kid -name "*.py" -not -path "*/.venv/*" -print0 \
            | while IFS= read -r -d '' f; do
              lines=$(wc -l < "$f")
              if [ "$lines" -gt 400 ]; then
                echo "❌ $f: ${lines} lines > 400"
                exit 1
              fi
            done
          echo "✅ All files ≤ 400 lines"

      # ── Pylint (quality gate, soft-fail on notes/warnings) ───────────
      - name: Pylint — code quality
        continue-on-error: true
        run: pylint dev/kid/ --exit-zero --output-format=colorized

      # ── Tests ────────────────────────────────────────────────────────
      - name: Run tests
        run: |
          cd dev && python -m pytest kid/tests/ -v --tb=short
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
