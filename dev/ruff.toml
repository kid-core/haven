# ruff config for Haven — tight but practical
# https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 100

[lint]
select = [
    "E",      # pycodestyle errors
    "F",      # pyflakes (unused imports, undefined names)
    "W",      # pycodestyle warnings
    "I",      # isort (import ordering)
    "N",      # pep8-naming
    "UP",     # pyupgrade (modern Python)
    "B",      # flake8-bugbear
    "SIM",    # flake8-simplify
    "C4",     # flake8-comprehensions
]
ignore = [
    "E501",   # line-too-long (handled by formatter)
    "B008",   # do-not-perform-function-calls-in-arg-defaults
]

[lint.per-file-ignores]
"kid/tests/*.py" = ["N802", "N803", "S101", "N806", "F811", "SIM117"]
"kid/tools/mcp/*.py" = ["SIM117", "SIM105"]  # nested with + suppress are fine for async ctx mgr

[format]
quote-style = "double"
indent-style = "space"
